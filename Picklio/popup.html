<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Picklio</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 12px;
        width: 250px;
        background: #ffffff;
        color: #333333;
      }
      h1 {
        font-size: 16px;
        margin-bottom: 12px;
      }
      button {
        display: inline-block;
        margin-top: 8px;
        padding: 6px 12px;
        background-color: #4285F4;
        color: #ffffff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Picklio</h1>
    <p>
      Highlight text or right click an image on any web page and select the appropriate option from the context menu to get answers, hints or pointers, scan images or extract text via OCR. Use Quick Snap to draw a box around text or diagrams when you need more control.
    </p>
    <button id="open-options">Configure API Key</button>
    <script src="popup.js"></script>
  </body>
</html>
